<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>会议·反刍舱｜AI 复盘 & 行动管理 · 完整版</title>
    <style>
        /* ===== 基础变量与主题 ===== */
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; transition: background-color 0.2s ease, border-color 0.2s; }

        :root {
            --bg-body: #fdf8f0;
            --card-bg: #fffbf5;
            --card-border: #f0e4d5;
            --text-primary: #2c1e0e;
            --accent-color: #b45f2b;
            --accent-light: #fbe9d2;
            --accent-border: #e3c299;
            --badge-bg: #f5e6d3;
            --ruminant-bg: #f5ede1;
            --api-bg: #fff4e0;
            --history-hover: #f7ede0;
            --btn-bg: white;
            --btn-border: #d4b594;
            --pre-bg: #1e1a16;
            --pre-color: #f3e9dd;
        }

        body.theme-gray {
            --bg-body: #f2f4f7;
            --card-bg: #ffffff;
            --card-border: #d0d5dd;
            --text-primary: #1e293b;
            --accent-color: #475569;
            --accent-light: #eef2f6;
            --accent-border: #cbd5e1;
            --badge-bg: #e9eef4;
            --ruminant-bg: #f1f5f9;
            --api-bg: #f8fafc;
            --history-hover: #f1f5f9;
            --btn-bg: white;
            --btn-border: #cbd5e1;
            --pre-bg: #1e293b;
            --pre-color: #e2e8f0;
        }

        body.theme-mint {
            --bg-body: #ecf9f5;
            --card-bg: #ffffffec;
            --card-border: #c2e3d8;
            --text-primary: #1e3a3a;
            --accent-color: #0e6b5e;
            --accent-light: #d1f0e8;
            --accent-border: #9fd3c2;
            --badge-bg: #d6efe7;
            --ruminant-bg: #e2f3ec;
            --api-bg: #f0faf7;
            --history-hover: #e0f2eb;
            --btn-bg: white;
            --btn-border: #a6cec0;
            --pre-bg: #1c3530;
            --pre-color: #d4ede5;
        }

        body.theme-ink {
            --bg-body: #ececec;
            --card-bg: #fefefe;
            --card-border: #a0a0a0;
            --text-primary: #111111;
            --accent-color: #2c2c2c;
            --accent-light: #d4d4d4;
            --accent-border: #888888;
            --badge-bg: #dbdbdb;
            --ruminant-bg: #e2e2e2;
            --api-bg: #f2f2f2;
            --history-hover: #e0e0e0;
            --btn-bg: #f9f9f9;
            --btn-border: #777;
            --pre-bg: #2a2a2a;
            --pre-color: #f0f0f0;
        }

        body {
            background: var(--bg-body);
            margin: 0;
            padding: 20px;
            color: var(--text-primary);
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
            border: 1px solid var(--card-border);
        }
        h1 { margin: 0 0 8px; font-size: 1.9rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        h1 small { font-size: 0.8rem; background: var(--accent-light); padding: 4px 14px; border-radius: 30px; color: var(--accent-color); font-weight: 500; }
        .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; align-items: center; }
        .btn {
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.15s;
            color: var(--text-primary);
        }
        .btn-primary {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
        }
        .btn-primary:hover { filter: brightness(0.9); }
        .btn-outline {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        .btn-outline:hover { background: var(--accent-light); }
        textarea {
            width: 100%;
            padding: 14px;
            border-radius: 20px;
            border: 1.5px solid var(--card-border);
            font-size: 0.95rem;
            font-family: 'SF Mono', 'Menlo', monospace;
            margin: 10px 0;
            resize: vertical;
            background: var(--card-bg);
            color: var(--text-primary);
        }
        .result-section {
            background: var(--accent-light);
            border-radius: 20px;
            padding: 16px 20px;
            margin-top: 16px;
            border-left: 5px solid var(--accent-color);
        }
        .todo-item {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 12px 16px;
            margin: 10px 0;
            border: 1px solid var(--card-border);
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .todo-check { margin-top: 3px; transform: scale(1.2); accent-color: var(--accent-color); }
        .todo-content { flex: 1; }
        .badge {
            background: var(--badge-bg);
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            display: inline-block;
            margin-right: 8px;
            color: var(--text-primary);
            font-weight: 500;
        }
        .ruminant-box {
            background: var(--ruminant-bg);
            padding: 14px 18px;
            border-radius: 18px;
            margin-top: 12px;
            border-left: 4px solid var(--accent-color);
        }
        .api-config {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            background: var(--api-bg);
            padding: 14px 18px;
            border-radius: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--accent-border);
        }
        .api-config input {
            flex: 2; min-width: 220px; padding: 10px 14px; border-radius: 40px;
            border: 1.5px solid var(--card-border); background: var(--card-bg);
            color: var(--text-primary);
        }
        .whisper-row { background: var(--accent-light); padding: 12px 18px; border-radius: 24px; margin: 12px 0; }
        .history-item {
            background: var(--card-bg);
            margin: 10px 0; padding: 14px 16px; border-radius: 18px;
            cursor: pointer; border: 1px solid var(--card-border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .history-item:hover { background: var(--history-hover); }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .pre-block {
            background: var(--pre-bg); color: var(--pre-color);
            padding: 16px; border-radius: 16px; font-family: monospace; white-space: pre-wrap;
        }
        .theme-switcher {
            display: flex; gap: 8px; margin-left: auto;
        }
        .theme-dot {
            width: 28px; height: 28px; border-radius: 28px; cursor: pointer;
            border: 2px solid transparent; transition: 0.1s;
        }
        .theme-dot.active { border-color: var(--accent-color); box-shadow: 0 0 0 2px var(--accent-light); }
        .theme-dot.warm { background: #e6c9a8; }
        .theme-dot.gray { background: #94a3b8; }
        .theme-dot.mint { background: #7fcdcd; }
        .theme-dot.ink { background: #5a5a5a; }

        .feedback-label {
            position: fixed; bottom: 16px; right: 16px;
            background: var(--accent-light);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            color: var(--text-primary);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 0.5px solid var(--accent-border);
            z-index: 999;
            pointer-events: auto;
            opacity: 0.9;
            transition: opacity 0.2s;
        }
        .feedback-label:hover { opacity: 1; }
        .feedback-label a {
            color: var(--accent-color); text-decoration: none; font-weight: 500;
        }
        .feedback-label a:hover { text-decoration: underline; }

        .export-dropdown { position: relative; display: inline-block; }
        .export-content {
            display: none; position: absolute; background: var(--card-bg);
            min-width: 140px; box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            border-radius: 16px; border: 1px solid var(--card-border);
            z-index: 10; padding: 6px 0;
        }
        .export-dropdown:hover .export-content { display: block; }
        .export-content button {
            background: none; border: none; width: 100%; text-align: left;
            padding: 8px 16px; cursor: pointer; color: var(--text-primary);
        }
        .export-content button:hover { background: var(--accent-light); }

        .reminder-panel { background: var(--accent-light); border-radius: 20px; padding: 14px; margin-top: 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .custom-remind { width: 70px; padding: 6px; border-radius: 30px; border: 1px solid var(--accent-border); background: var(--card-bg); }
        .stats-badge { background: var(--accent-color); color: white; border-radius: 20px; padding: 2px 10px; font-size: 0.8rem; margin-left: 6px; }
        .delete-history { margin-left: 8px; color: #b91c1c; cursor: pointer; opacity: 0.7; }
        .delete-history:hover { opacity: 1; }
        .endpoint-hint { font-size:0.75rem; opacity:0.7; margin-left:8px; }
    </style>
    <!-- transformers.js -->
    <script type="importmap">
        {"imports": {"@xenova/transformers": "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js"}}
    </script>
</head>
<body class="theme-warm">
<div class="container">
    <div class="card">
        <div class="flex-between">
            <h1>🔄 会议·反刍舱 <small>AI 复盘 → 行动管理</small></h1>
            <div class="theme-switcher">
                <div class="theme-dot warm active" data-theme="warm" title="暖"></div>
                <div class="theme-dot gray" data-theme="gray" title="灰"></div>
                <div class="theme-dot mint" data-theme="mint" title="清"></div>
                <div class="theme-dot ink" data-theme="ink" title="ink"></div>
            </div>
        </div>
        <p>录音 / 上传音频 → 自动转文字 → AI 提取议题、待办、反刍 · 支持本地智能 & 待办追踪</p>

        <!-- API 配置 -->
        <div class="api-config">
            <span style="font-weight:600;">🔑 DeepSeek API Key:</span>
            <input type="password" id="apiKey" placeholder="sk-xxxx" value="">
            <button class="btn" id="saveApiKeyBtn">💾 保存</button>
            <button class="btn btn-outline" id="useMockBtn">🧠 本地智能分析</button>
            <span style="font-size:0.8rem; opacity:0.8;">(无key时自动本地规则)</span>
        </div>
        <!-- 本地模型端点 -->
        <div class="api-config" style="margin-top:-8px;">
            <span style="font-weight:600;">🖥️ 本地模型端点:</span>
            <input type="text" id="localEndpoint" placeholder="http://localhost:11434/v1/chat/completions" value="">
            <button class="btn btn-outline" id="useLocalModelBtn">🧪 使用本地模型</button>
            <span class="endpoint-hint">支持 Ollama / LM Studio / 豆包本地等 (OpenAI兼容)</span>
        </div>

        <!-- 录音 & Whisper -->
        <div class="row">
            <button class="btn btn-primary" id="startRecordBtn">🎙️ 开始录音</button>
            <button class="btn" id="stopRecordBtn" disabled>⏹️ 停止</button>
            <span id="recordingStatus" style="color:#b91c1c;">⚪ 未录音</span>
        </div>
        <div class="whisper-row">
            <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                <span style="font-weight:600;">🧠 本地 Whisper</span>
                <input type="file" id="audioFileInput" accept="audio/*, .wav, .mp3, .m4a, .ogg, .flac" style="padding:6px; border-radius:30px; background:var(--card-bg);">
                <button class="btn btn-outline" id="transcribeWhisperBtn">📁 开始转写</button>
                <span id="whisperStatus" style="font-size:0.85rem;"></span>
            </div>
        </div>

        <label>📝 会议转文字</label>
        <textarea id="transcriptText" rows="5" placeholder="录音转写结果 / 粘贴纪要..."></textarea>

        <div class="row">
            <button class="btn btn-primary" id="analyzeBtn">🧠 AI 深度分析</button>
            <button class="btn" id="saveMeetingBtn">💾 保存会议</button>
            <div class="export-dropdown">
                <button class="btn">📎 导出 ▼</button>
                <div class="export-content">
                    <button data-export="csv">📊 待办 CSV</button>
                    <button data-export="md">📝 Markdown</button>
                    <button data-export="txt">📄 纯文本 TXT</button>
                    <button data-export="doc">📃 Word (DOC)</button>
                    <button data-export="docx">📑 Word (DOCX)</button>
                    <button data-export="json">📦 备份JSON</button>
                </div>
            </div>
            <button class="btn btn-outline" id="generateWeekReportBtn">📊 周报生成</button>
        </div>

        <!-- 反刍提醒面板 -->
        <div id="reminderPanel" class="reminder-panel" style="display: none;">
            <span>⏰ 反刍提醒：</span>
            <button class="btn" data-remind="1h">🕐 1小时</button>
            <button class="btn" data-remind="1d">📅 1天</button>
            <input type="number" id="customMinutes" placeholder="分钟" min="1" class="custom-remind" value="30">
            <button class="btn" id="setCustomRemind">⏲️ 自定义</button>
            <button class="btn" id="closeReminderPanel">✖ 关闭</button>
            <span id="reminderFeedback" style="margin-left:auto;"></span>
        </div>

        <!-- 分析结果 -->
        <div id="analysisResult" style="display: none;">
            <div class="result-section"><h3>📌 议题分段</h3><div id="topicsOutput"></div></div>
            <div class="result-section"><h3>✅ 待办事项 (点击复选框标记完成)</h3><div id="todosOutput"></div></div>
            <div class="result-section"><h3>🤔 反刍问题</h3><div id="questionsOutput" class="ruminant-box"></div></div>
        </div>

        <!-- 周报区域 -->
        <div id="weeklyReportSection" style="display:none; margin-top:20px;">
            <div style="background: var(--accent-light); border-radius: 20px; padding: 18px;">
                <div class="flex-between"><h3>📋 本周产出 · 待办追踪</h3><button class="btn" id="copyWeekReportBtn">📋 复制</button></div>
                <div id="weeklyReportContent" class="pre-block"></div>
            </div>
        </div>
    </div>

    <!-- 历史列表 -->
    <div class="card">
        <div class="flex-between">
            <h3>📚 历史会议 (点击加载)</h3>
            <div>
                <button class="btn btn-outline" id="exportAllJsonBtn" style="margin-right:8px;">📦 导出全部</button>
                <button class="btn btn-outline" id="clearAllHistoryBtn" style="border-color:#b91c1c; color:#b91c1c;">🗑️ 清空历史</button>
            </div>
        </div>
        <div id="historyList" class="meeting-history" style="max-height:400px; overflow-y:auto;">暂无记录</div>
    </div>
</div>

<div class="feedback-label">
    📬 <a href="mailto:ilikeitnow@qq.com">反馈</a> · <span style="opacity:0.7;">本地智能+待办追踪</span>
</div>

<script type="module">
    import { pipeline, env } from '@xenova/transformers';
    env.allowLocalModels = true; env.useBrowserCache = true;

    // ---- 主题切换 ----
    const themeDots = document.querySelectorAll('.theme-dot');
    themeDots.forEach(dot => {
        dot.addEventListener('click', () => {
            document.body.className = `theme-${dot.dataset.theme}`;
            themeDots.forEach(d => d.classList.remove('active'));
            dot.classList.add('active');
            localStorage.setItem('theme', dot.dataset.theme);
        });
    });
    const savedTheme = localStorage.getItem('theme') || 'warm';
    document.body.className = `theme-${savedTheme}`;
    themeDots.forEach(d => { if(d.dataset.theme === savedTheme) d.classList.add('active'); });

    // ---- 全局变量 ----
    let db, whisperPipeline, currentAnalysis = null, currentMeetingId = null;
    let useLocalFallback = true;      // 内置规则模式
    let useLocalModelEndpoint = false; // 是否启用本地端点
    let recognition, isRecording = false;
    let reminderTimers = []; // 存储定时器ID

    // ---- IndexedDB ----
    function initDB() {
        return new Promise((res, rej) => {
            const req = indexedDB.open("MeetingRuminantDB_v5", 1);
            req.onerror = () => rej(req.error);
            req.onsuccess = () => { db = req.result; res(); };
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains("meetings")) db.createObjectStore("meetings", { keyPath: "id", autoIncrement: true });
            };
        });
    }
    async function saveMeeting(meeting) {
        const tx = db.transaction("meetings", "readwrite");
        const store = tx.objectStore("meetings");
        // 如果 meeting 有 id 且存在则更新，否则新增
        if (meeting.id != null) {
            return new Promise((res, rej) => {
                const putReq = store.put(meeting);
                putReq.onsuccess = () => { currentMeetingId = putReq.result; res(putReq.result); };
                putReq.onerror = rej;
            });
        } else {
            delete meeting.id;
            const addReq = store.add(meeting);
            return new Promise((res, rej) => {
                addReq.onsuccess = () => { currentMeetingId = addReq.result; res(addReq.result); };
                addReq.onerror = rej;
            });
        }
    }
    async function loadMeetings() {
        const tx = db.transaction("meetings", "readonly");
        const req = tx.objectStore("meetings").getAll();
        return new Promise((res, rej) => { req.onsuccess = () => res(req.result); req.onerror = rej; });
    }
    async function deleteMeetingById(id) {
        const tx = db.transaction("meetings", "readwrite");
        tx.objectStore("meetings").delete(id);
        return new Promise(r => { tx.oncomplete = r; });
    }
    async function deleteAllMeetings() {
        const tx = db.transaction("meetings", "readwrite");
        tx.objectStore("meetings").clear();
        return new Promise(r => { tx.oncomplete = r; });
    }

    // ---- 历史渲染 ----
    async function renderHistory() {
        const meetings = await loadMeetings();
        const cont = document.getElementById("historyList");
        if (!meetings.length) { cont.innerHTML = "暂无会议记录"; return; }
        cont.innerHTML = meetings.reverse().map(m => {
            const todoCount = m.analysis?.todos?.length || 0;
            const completed = m.analysis?.todos?.filter(t=>t.completed).length || 0;
            return `
            <div class="history-item" data-id="${m.id}">
                <div style="flex:1">
                    <strong>📅 ${new Date(m.createdAt).toLocaleString()}</strong><br>
                    <span>${(m.transcript||'').substring(0,70)}...</span> 
                    ${m.analysis ? `<span class="stats-badge">${completed}/${todoCount} 完成</span>` : ''}
                </div>
                <span class="delete-history" data-delete-id="${m.id}" title="删除此条">🗑️</span>
            </div>
        `}).join("");

        cont.querySelectorAll('.history-item').forEach(el => el.addEventListener('click', async (e) => {
            if (e.target.classList.contains('delete-history')) {
                e.stopPropagation();
                const id = Number(e.target.dataset.deleteId);
                await deleteMeetingById(id);
                await renderHistory();
                return;
            }
            const id = Number(el.dataset.id);
            const m = (await loadMeetings()).find(x=>x.id===id);
            if(m){
                currentMeetingId = m.id;
                document.getElementById("transcriptText").value = m.transcript||'';
                if(m.analysis) { 
                    currentAnalysis = m.analysis; 
                    displayAnalysis(m.analysis); 
                    document.getElementById("analysisResult").style.display='block'; 
                } else {
                    currentAnalysis = null;
                    document.getElementById("analysisResult").style.display='none';
                }
                document.getElementById("weeklyReportSection").style.display='none';
            }
        }));
    }

    // ---- 语音识别 ----
    function initSpeech() {
        if(!('webkitSpeechRecognition' in window)) { alert("浏览器不支持语音识别"); return null; }
        const r = new webkitSpeechRecognition(); r.continuous = true; r.interimResults = true; r.lang='zh-CN';
        r.onresult = e => {
            let final='', interim='';
            for(let i=e.resultIndex;i<e.results.length;i++){
                const t = e.results[i][0].transcript;
                if(e.results[i].isFinal) final+=t; else interim+=t;
            }
            const ta = document.getElementById("transcriptText");
            ta.value = ta.value + final + interim;
        };
        return r;
    }
    document.getElementById("startRecordBtn").onclick = ()=>{
        if(recognition) recognition.abort();
        recognition = initSpeech(); if(!recognition) return;
        recognition.start(); isRecording=true;
        document.getElementById("recordingStatus").innerHTML='🔴 录音中';
        document.getElementById("stopRecordBtn").disabled=false;
        document.getElementById("startRecordBtn").disabled=true;
    };
    document.getElementById("stopRecordBtn").onclick = ()=>{
        if(recognition) recognition.stop();
        isRecording=false;
        document.getElementById("recordingStatus").innerHTML='⚪ 已停止';
        document.getElementById("stopRecordBtn").disabled=true;
        document.getElementById("startRecordBtn").disabled=false;
    };

    // ---- Whisper ----
    async function loadWhisper() {
        if(whisperPipeline) return whisperPipeline;
        document.getElementById("whisperStatus").innerText='⏳ 加载模型...';
        whisperPipeline = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny');
        document.getElementById("whisperStatus").innerText='✅ 就绪';
        return whisperPipeline;
    }
    document.getElementById("transcribeWhisperBtn").onclick = async ()=>{
        const file = document.getElementById("audioFileInput").files[0];
        if(!file) return alert("选文件");
        const status = document.getElementById("whisperStatus");
        status.innerText='🔄 转写中';
        try{
            const transcriber = await loadWhisper();
            const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
            const buf = await audioCtx.decodeAudioData(await file.arrayBuffer());
            let data = buf.getChannelData(0);
            if(buf.numberOfChannels===2){
                const l=buf.getChannelData(0), r=buf.getChannelData(1);
                data = new Float32Array(l.length);
                for(let i=0;i<l.length;i++) data[i]=(l[i]+r[i])/2;
            }
            const result = await transcriber(data, {sampling_rate: buf.sampleRate, language:'zh'});
            document.getElementById("transcriptText").value = result.text;
            status.innerText='✅ 完成';
        }catch(e){ status.innerText='❌ 失败'; alert(e.message); }
    };

    // ========== 增强的本地智能分析 ==========
    function localAnalyze(text) {
        const lines = text.split(/\n+/);
        const topics = new Set();
        const questions = new Set();
        
        lines.forEach(line => {
            const trimmed = line.trim();
            if (/^(议题|主题|讨论|项目|#\s*)[：:]\s*(.+)/.test(trimmed)) {
                topics.add(RegExp.$2.trim());
            } else if (trimmed.length > 6 && trimmed.length < 50 && !trimmed.includes('。') && /^[一二三四五六七八九十]?[、.]?\s*\S/.test(trimmed)) {
                if (!/[?？]$/.test(trimmed)) topics.add(trimmed);
            }
            if (/[?？]$/.test(trimmed) || /^(如何|怎么|为什么|是否|可否|能否|什么|哪)/.test(trimmed)) {
                questions.add(trimmed);
            }
        });

        const taskMap = new Map();
        const explicitMatches = [...text.matchAll(/TODO|待办|任务|Action|事项[：:]\s*(.+?)(?=\n|$)/gi)];
        explicitMatches.forEach(m => {
            const task = m[1].trim();
            if (task) taskMap.set(task, { task, owner: '', deadline: '', completed: false });
        });

        const ownerMatches = [...text.matchAll(/(.+?)[\s@]+([\u4e00-\u9fa5a-zA-Z]{2,4})(?=\s|$|,|，)/g)];
        ownerMatches.forEach(m => {
            let task = m[1].trim();
            const owner = m[2];
            if (task.length < 4) return;
            if (taskMap.has(task)) taskMap.get(task).owner = owner;
            else taskMap.set(task, { task, owner, deadline: '', completed: false });
        });

        const deadlineMatches = [...text.matchAll(/(.+?)(?:截止|DDL|deadline)[：: ]*([^\n,，]{2,30})/gi)];
        deadlineMatches.forEach(m => {
            let task = m[1].replace(/截止|DDL|deadline/gi, '').trim();
            const deadline = m[2].trim();
            if (task.length < 4) return;
            if (taskMap.has(task)) taskMap.get(task).deadline = deadline;
            else taskMap.set(task, { task, owner: '', deadline, completed: false });
        });

        if (taskMap.size < 2) {
            const listItems = [...text.matchAll(/^[-*•]\s*(.+)$/gm)];
            listItems.forEach(m => {
                const task = m[1].trim();
                if (task.length > 4 && !taskMap.has(task)) taskMap.set(task, { task, owner: '', deadline: '', completed: false });
            });
        }

        if (topics.size === 0) lines.slice(0, 5).forEach(l => { if(l.trim().length>8) topics.add(l.trim()); });
        
        return {
            topics: [...topics].slice(0, 10),
            todos: [...taskMap.values()].slice(0, 20),
            questions: [...questions].slice(0, 8)
        };
    }

    // ========== 通用 OpenAI 兼容调用 (支持本地模型) ==========
    async function callOpenAICompatible(endpoint, text, apiKey = '', retries = 2) {
        const prompt = `你是一个专业的会议纪要分析助手。请严格按以下JSON格式输出（不要包含任何额外解释）：
{
  "topics": ["议题1", "议题2", ...],
  "todos": [
    { "task": "具体任务描述", "owner": "负责人姓名(若未提及留空)", "deadline": "截止时间", "completed": false }
  ],
  "questions": ["需要跟进的问题1", ...]
}
会议记录：${text.substring(0, 4000)}`;

        for (let i = 0; i <= retries; i++) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 20000);
                const headers = { "Content-Type": "application/json" };
                if (apiKey) headers["Authorization"] = `Bearer ${apiKey}`;
                
                const response = await fetch(endpoint, {
                    method: "POST",
                    headers,
                    body: JSON.stringify({
                        model: "local-model",
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.2,
                        response_format: { type: "json_object" }
                    }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                let content = data.choices[0].message.content;
                const jsonMatch = content.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    const parsed = JSON.parse(jsonMatch[0]);
                    parsed.todos = (parsed.todos || []).map(t => ({
                        task: t.task || '未命名任务',
                        owner: t.owner || '',
                        deadline: t.deadline || '',
                        completed: false
                    }));
                    parsed.topics = parsed.topics || [];
                    parsed.questions = parsed.questions || [];
                    return parsed;
                }
                throw new Error("非JSON响应");
            } catch (e) {
                console.warn(`本地模型调用失败 (${i+1}/${retries+1}):`, e);
                if (i === retries) throw e;
                await new Promise(r => setTimeout(r, 1000 * (i+1)));
            }
        }
    }

    // 主分析函数
    async function callAI(text) {
        const localEndpoint = document.getElementById("localEndpoint").value.trim();
        const deepseekKey = document.getElementById("apiKey").value.trim() || localStorage.getItem("deepseek_key");
        
        if (useLocalModelEndpoint && localEndpoint) {
            try {
                return await callOpenAICompatible(localEndpoint, text, '');
            } catch (e) {
                alert(`⚠️ 本地模型调用失败，回退内置规则\n${e.message}`);
                return localAnalyze(text);
            }
        }
        
        if (!useLocalFallback && deepseekKey) {
            try {
                return await callDeepSeekWithRetry(text, deepseekKey);
            } catch (e) {
                alert(`⚠️ DeepSeek失败，使用内置规则\n${e.message}`);
                return localAnalyze(text);
            }
        }
        
        return localAnalyze(text);
    }

    async function callDeepSeekWithRetry(text, apiKey, retries = 2) {
        const prompt = `你是一个专业的会议纪要分析助手。请严格按以下JSON格式输出（不要包含任何额外解释）：
{
  "topics": ["议题1", "议题2", ...],
  "todos": [
    { "task": "具体任务描述", "owner": "负责人姓名(若未提及留空)", "deadline": "截止时间(如'明天'、'2026-04-20'，未提及留空)", "completed": false }
  ],
  "questions": ["需要跟进的问题1", "问题2", ...]
}

会议记录内容如下：
${text.substring(0, 4000)}`;

        for (let i = 0; i <= retries; i++) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);
                const response = await fetch("https://api.deepseek.com/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                    body: JSON.stringify({ model: "deepseek-chat", messages: [{ role: "user", content: prompt }], temperature: 0.2, response_format: { type: "json_object" } }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                if (!response.ok) throw new Error(`API错误 ${response.status}`);
                const data = await response.json();
                let content = data.choices[0].message.content;
                const jsonMatch = content.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    const parsed = JSON.parse(jsonMatch[0]);
                    parsed.todos = (parsed.todos || []).map(t => ({ task: t.task || '未命名任务', owner: t.owner || '', deadline: t.deadline || '', completed: false }));
                    return parsed;
                }
                throw new Error("返回内容非JSON");
            } catch (e) {
                if (i === retries) throw e;
                await new Promise(r => setTimeout(r, 1000 * (i+1)));
            }
        }
    }
    
    function displayAnalysis(a){
        document.getElementById("topicsOutput").innerHTML = a.topics.map(t=>`<div>• ${t}</div>`).join('');
        const todosDiv = document.getElementById("todosOutput");
        if (!a.todos || a.todos.length === 0) {
            todosDiv.innerHTML = '<div>暂无待办</div>';
        } else {
            todosDiv.innerHTML = a.todos.map((t, idx) => `
                <div class="todo-item" data-todo-index="${idx}">
                    <input type="checkbox" class="todo-check" ${t.completed ? 'checked' : ''} data-index="${idx}">
                    <div class="todo-content">
                        <strong>${t.task}</strong><br>
                        <span class="badge">👤 ${t.owner||'未指派'}</span>
                        <span class="badge">⏰ ${t.deadline||'无截止'}</span>
                    </div>
                </div>
            `).join('');
            todosDiv.querySelectorAll('.todo-check').forEach(cb => {
                cb.addEventListener('change', async (e) => {
                    const idx = e.target.dataset.index;
                    if (currentAnalysis && currentAnalysis.todos && currentAnalysis.todos[idx]) {
                        currentAnalysis.todos[idx].completed = e.target.checked;
                        if (currentMeetingId) {
                            const meetings = await loadMeetings();
                            const meeting = meetings.find(m => m.id === currentMeetingId);
                            if (meeting) { meeting.analysis = currentAnalysis; await saveMeeting(meeting); }
                        }
                    }
                });
            });
        }
        document.getElementById("questionsOutput").innerHTML = a.questions.map((q,i)=>`<div>${i+1}. ${q}</div>`).join('');
    }
    
    document.getElementById("analyzeBtn").onclick = async ()=>{
        const text = document.getElementById("transcriptText").value.trim();
        if(!text) return alert("无内容");
        const a = await callAI(text);
        if(a){ currentAnalysis = a; displayAnalysis(a); document.getElementById("analysisResult").style.display='block'; }
    };

    // ---- 保存会议 ----
    document.getElementById("saveMeetingBtn").onclick = async () => {
        const transcript = document.getElementById("transcriptText").value.trim();
        if (!transcript && !currentAnalysis) return alert("没有内容可保存");
        const meeting = {
            id: currentMeetingId || undefined,
            transcript: transcript,
            analysis: currentAnalysis,
            createdAt: new Date().toISOString()
        };
        if (currentMeetingId) {
            // 更新已有会议的时间（保留原创建时间）
            const existing = (await loadMeetings()).find(m => m.id === currentMeetingId);
            if (existing) meeting.createdAt = existing.createdAt;
        }
        await saveMeeting(meeting);
        alert("会议已保存");
        await renderHistory();
    };

    // ---- 导出功能 ----
    function exportData(format) {
        if (!currentAnalysis) return alert("暂无分析结果可导出");
        const a = currentAnalysis;
        const text = document.getElementById("transcriptText").value || '';
        const timestamp = new Date().toISOString().slice(0,10);
        let content = '', filename = '', mimeType = 'text/plain';
        
        switch(format) {
            case 'csv':
                content = '任务,负责人,截止日期,已完成\n' + a.todos.map(t => `"${t.task}","${t.owner}","${t.deadline}","${t.completed? '是':'否'}"`).join('\n');
                filename = `待办_${timestamp}.csv`;
                break;
            case 'md':
                content = `# 会议纪要\n\n## 议题\n${a.topics.map(t=>'- '+t).join('\n')}\n\n## 待办\n${a.todos.map(t=>`- [${t.completed?'x':' '}] ${t.task} (${t.owner}, ${t.deadline})`).join('\n')}\n\n## 需跟进问题\n${a.questions.map(q=>'- '+q).join('\n')}`;
                filename = `会议纪要_${timestamp}.md`;
                break;
            case 'txt':
                content = `议题：\n${a.topics.join('\n')}\n\n待办：\n${a.todos.map(t=>`[${t.completed?'✓':' '}] ${t.task} ${t.owner} ${t.deadline}`).join('\n')}\n\n问题：\n${a.questions.join('\n')}`;
                filename = `会议记录_${timestamp}.txt`;
                break;
            case 'doc':
                content = `<html><meta charset="UTF-8"><body><h2>会议纪要</h2><h3>议题</h3><ul>${a.topics.map(t=>`<li>${t}</li>`).join('')}</ul><h3>待办</h3><ul>${a.todos.map(t=>`<li>[${t.completed?'✓':' '}] ${t.task} (${t.owner}, ${t.deadline})</li>`).join('')}</ul><h3>问题</h3><ul>${a.questions.map(q=>`<li>${q}</li>`).join('')}</ul></body></html>`;
                filename = `会议纪要_${timestamp}.doc`;
                mimeType = 'application/msword';
                break;
            case 'docx':
                content = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset="UTF-8"><title>会议纪要</title></head><body><h2>会议纪要</h2>...${a.topics.join(', ')}...</body></html>`;
                filename = `会议纪要_${timestamp}.docx`;
                mimeType = 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
                break;
            case 'json':
                content = JSON.stringify({ transcript: text, analysis: a }, null, 2);
                filename = `会议备份_${timestamp}.json`;
                mimeType = 'application/json';
                break;
        }
        const blob = new Blob(['\uFEFF' + content], {type: mimeType + ';charset=utf-8'});
        const url = URL.createObjectURL(blob);
        const aEl = document.createElement('a');
        aEl.href = url; aEl.download = filename;
        aEl.click(); URL.revokeObjectURL(url);
    }
    document.querySelectorAll('[data-export]').forEach(btn => {
        btn.addEventListener('click', () => exportData(btn.dataset.export));
    });

    // ---- 周报生成 ----
    document.getElementById("generateWeekReportBtn").onclick = async () => {
        const meetings = await loadMeetings();
        const now = new Date();
        const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
        const recentMeetings = meetings.filter(m => new Date(m.createdAt) >= weekAgo);
        if (recentMeetings.length === 0) return alert("近7天无会议记录");
        
        let totalTodos = 0, completedTodos = 0;
        const allTodos = [];
        recentMeetings.forEach(m => {
            if (m.analysis?.todos) {
                m.analysis.todos.forEach(t => {
                    totalTodos++;
                    if (t.completed) completedTodos++;
                    allTodos.push({...t, meetingDate: m.createdAt});
                });
            }
        });
        
        const completionRate = totalTodos ? ((completedTodos / totalTodos) * 100).toFixed(1) : 0;
        let report = `📊 本周会议反刍周报 (${new Date(weekAgo).toLocaleDateString()} - ${now.toLocaleDateString()})\n`;
        report += `━━━━━━━━━━━━━━━━━━\n`;
        report += `📅 会议场次：${recentMeetings.length}\n`;
        report += `✅ 待办完成率：${completedTodos}/${totalTodos} (${completionRate}%)\n\n`;
        report += `📋 待办清单：\n`;
        allTodos.forEach((t, i) => {
            report += `  ${t.completed ? '✓' : '○'} ${t.task} (${t.owner || '未指派'}) ${t.deadline ? '截止:'+t.deadline : ''}\n`;
        });
        
        document.getElementById("weeklyReportContent").textContent = report;
        document.getElementById("weeklyReportSection").style.display = 'block';
    };
    document.getElementById("copyWeekReportBtn").onclick = () => {
        const content = document.getElementById("weeklyReportContent").textContent;
        navigator.clipboard.writeText(content).then(() => alert("已复制"));
    };

    // ---- 反刍提醒 ----
    function setReminder(minutes) {
        if (!currentMeetingId) return alert("请先保存会议或加载一个会议");
        const triggerTime = Date.now() + minutes * 60 * 1000;
        const timerId = setTimeout(async () => {
            if (Notification.permission === "granted") {
                new Notification("会议反刍提醒", { body: "该回顾会议并检查待办完成情况了", icon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔄%3C/text%3E%3C/svg%3E" });
            }
            // 同时高亮对应的历史项
            const historyItems = document.querySelectorAll('.history-item');
            historyItems.forEach(el => {
                if (el.dataset.id == currentMeetingId) {
                    el.style.background = 'var(--accent-light)';
                    setTimeout(() => el.style.background = '', 3000);
                }
            });
            document.getElementById("reminderFeedback").textContent = '🔔 已提醒';
            // 清除已触发的计时器
            reminderTimers = reminderTimers.filter(t => t.id !== timerId);
        }, minutes * 60 * 1000);
        reminderTimers.push({ id: timerId, meetingId: currentMeetingId });
        document.getElementById("reminderFeedback").textContent = `⏰ 将在${minutes}分钟后提醒`;
    }
    document.querySelector('[data-remind="1h"]').onclick = () => setReminder(60);
    document.querySelector('[data-remind="1d"]').onclick = () => setReminder(1440);
    document.getElementById("setCustomRemind").onclick = () => {
        const mins = parseInt(document.getElementById("customMinutes").value);
        if (mins > 0) setReminder(mins);
    };
    document.getElementById("closeReminderPanel").onclick = () => {
        document.getElementById("reminderPanel").style.display = 'none';
    };
    // 显示/隐藏提醒面板
    document.getElementById("saveMeetingBtn").addEventListener('click', () => {
        document.getElementById("reminderPanel").style.display = 'flex';
    });
    // 加载历史时也显示面板
    const origRenderHistory = renderHistory;
    renderHistory = async function() {
        await origRenderHistory();
        if (currentMeetingId) document.getElementById("reminderPanel").style.display = 'flex';
    };

    // ---- 历史操作 ----
    document.getElementById("clearAllHistoryBtn").onclick = async () => {
        if (confirm("确定清空全部历史？")) {
            await deleteAllMeetings();
            currentMeetingId = null; currentAnalysis = null;
            document.getElementById("analysisResult").style.display = 'none';
            document.getElementById("transcriptText").value = '';
            await renderHistory();
        }
    };
    document.getElementById("exportAllJsonBtn").onclick = async () => {
        const meetings = await loadMeetings();
        if (meetings.length === 0) return alert("无数据");
        const json = JSON.stringify(meetings, null, 2);
        const blob = new Blob([json], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `全部会议备份_${new Date().toISOString().slice(0,10)}.json`;
        a.click(); URL.revokeObjectURL(url);
    };

    // ---- 模式切换按钮 ----
    document.getElementById("useMockBtn").onclick = ()=> { useLocalFallback = true; useLocalModelEndpoint = false; alert("✅ 内置智能规则已激活"); };
    document.getElementById("saveApiKeyBtn").onclick = ()=> { 
        const k=document.getElementById("apiKey").value.trim(); 
        if(k) { localStorage.setItem("deepseek_key", k); useLocalFallback = false; useLocalModelEndpoint = false; alert("DeepSeek API Key已保存"); }
        else { useLocalFallback = true; alert("未输入Key，使用内置规则"); }
    };
    document.getElementById("useLocalModelBtn").onclick = ()=> {
        const ep = document.getElementById("localEndpoint").value.trim();
        if (!ep) { alert("请填写本地模型端点地址"); return; }
        useLocalModelEndpoint = true;
        useLocalFallback = false;
        alert(`✅ 已切换到本地模型: ${ep}`);
    };

    // 启动
    (async ()=>{
        await initDB(); await renderHistory();
        const k = localStorage.getItem("deepseek_key"); if(k) document.getElementById("apiKey").value=k;
        if(Notification.permission==='default') Notification.requestPermission();
    })();
</script>
